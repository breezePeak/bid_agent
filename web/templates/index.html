<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标书 Agent 控制台</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>标书 Agent 控制台</h1>

<div id="running-notice" class="running-notice" style="display:none">
  <span class="spinner"></span>
  <span id="running-task"></span>
</div>

<h2>流水线</h2>
<div class="flow-container" id="flow-container"></div>

<div class="flow-actions">
  <button onclick="runFullPipeline()" class="primary" id="btn-full-run">一键运行全流程</button>
  <button onclick="runGraphRun()" class="primary" id="btn-graph-run">LangGraph 全流程</button>
</div>

<h2>快捷操作</h2>
<div class="btn-group">
  <button onclick="runCommand('init-demo')">生成演示资料</button>
  <button onclick="runCommand('init')" class="secondary">初始化项目</button>
  <button onclick="runCommand('validate')">校验项目</button>
</div>

<h2>文件上传</h2>
<div class="upload-row">
  <div class="upload-box">
    <label>招标文件</label>
    <input type="file" id="upload-tender" multiple>
    <button onclick="uploadFiles('tender')">上传</button>
  </div>
  <div class="upload-box">
    <label>公司资料</label>
    <input type="file" id="upload-company" multiple>
    <button onclick="uploadFiles('company')">上传</button>
  </div>
  <div class="upload-box">
    <label>Word 模板</label>
    <input type="file" id="upload-template" multiple>
    <button onclick="uploadFiles('template')">上传</button>
  </div>
</div>

<h2>下载</h2>
<div class="btn-group">
  <button onclick="downloadFinalMd()">下载 final.md</button>
  <button onclick="downloadFinalDocx()">下载 final.docx</button>
  <button onclick="viewGlobalReview()">查看全文审核 JSON</button>
</div>

<h2>日志</h2>
<div class="log-toolbar">
  <button onclick="clearLogs()">清空</button>
  <button onclick="toggleAutoScroll()">自动滚动: <span id="autoscroll-label">开</span></button>
</div>
<pre id="log-box" class="log-box"></pre>

<h2>危险操作</h2>
<div class="btn-group">
  <button class="danger" onclick="confirmClean()">清空工作区</button>
</div>

<script src="/static/app.js"></script>
</body>
</html>
